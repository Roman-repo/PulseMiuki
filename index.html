<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мост</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0a0a1a;--bg2:rgba(15,12,41,.95);--bg3:rgba(255,255,255,.08);--tx:#fff;--tx2:rgba(255,255,255,.5);--tx3:rgba(255,255,255,.3);--acc:#667eea;--acc2:#764ba2;--brd:rgba(255,255,255,.06);--grn:#00b894;--red:#E85D75}
[data-theme="light"]{--bg:#f0f2f5;--bg2:rgba(255,255,255,.95);--bg3:rgba(0,0,0,.06);--tx:#1a1a2e;--tx2:rgba(0,0,0,.5);--tx3:rgba(0,0,0,.3);--brd:rgba(0,0,0,.08);--acc:#667eea;--acc2:#764ba2;--grn:#00b894;--red:#E85D75}
[data-theme="madmax"]{--bg:#1a1008;--bg2:rgba(40,25,10,.95);--bg3:rgba(255,150,50,.1);--tx:#f0d0a0;--tx2:rgba(240,180,100,.5);--tx3:rgba(240,180,100,.3);--brd:rgba(255,120,30,.12);--acc:#e8600a;--acc2:#b8340a;--grn:#c4a035;--red:#c43030}
[data-theme="space"]{--bg:#06050f;--bg2:rgba(10,8,30,.95);--bg3:rgba(0,220,255,.08);--tx:#c8e0ff;--tx2:rgba(150,200,255,.5);--tx3:rgba(150,200,255,.3);--brd:rgba(0,180,255,.1);--acc:#00d4ff;--acc2:#7b2fff;--grn:#00ffa3;--red:#ff3075}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;background:#000;height:100dvh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;height:100dvh;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);background:var(--bg)}
button,input,select{-webkit-appearance:none;touch-action:manipulation;font-family:'Roboto',sans-serif}
.hidden{display:none!important}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

/* Screens */
.scr{height:100%;display:flex;flex-direction:column;position:relative}
.ls{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);padding:24px}
[data-theme="madmax"] .ls{background:linear-gradient(160deg,#1a0e00,#3d1f00,#2a1200)}
[data-theme="space"] .ls{background:linear-gradient(160deg,#03010a,#0d0630,#060218)}
.ll{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:0 8px 32px rgba(102,126,234,.4);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.lt{color:#fff;font-size:24px;font-weight:500;margin-bottom:8px}
.lsb{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:24px;font-weight:400}
.li{width:100%;max-width:320px;padding:14px 20px;font-size:16px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;outline:none;margin-top:10px;font-weight:400}
.li:focus{border-color:rgba(102,126,234,.6)}
.li::placeholder{color:rgba(255,255,255,.3)}
.lb{margin-top:12px;width:100%;max-width:320px;padding:14px;font-size:16px;font-weight:500;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.3)}
.lb.a{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 20px rgba(102,126,234,.4)}
.pin-kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:20px;width:100%;max-width:260px}
.pin-k{padding:14px;font-size:20px;font-weight:700;border-radius:14px;border:none;background:rgba(255,255,255,.07);color:#fff;cursor:pointer;text-align:center}
.pin-k:active{background:rgba(255,255,255,.15)}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.3)}
.pin-dot.f{background:var(--acc);border-color:var(--acc)}

/* Header */
.hdr{padding:12px 16px;display:flex;align-items:center;gap:8px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px);flex-shrink:0}
.hdr-t{color:var(--tx);font-weight:500;font-size:18px;flex:1}
.hdr-s{color:var(--tx2);font-size:13px;font-weight:400}
.hdr-s.tp{color:var(--acc)}
.ib{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:none}
.ib:active{background:var(--bg3)}
.bb{background:none;border:none;cursor:pointer;padding:6px}

/* Folder tabs - Telegram pill style */
.ftabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--brd);padding:8px 12px;flex-shrink:0;gap:6px;-webkit-overflow-scrolling:touch}
.ftab{padding:6px 16px;font-size:14px;font-weight:500;color:var(--tx2);border:none;background:var(--bg3);cursor:pointer;white-space:nowrap;border-radius:20px;flex-shrink:0}
.ftab.act{color:#fff;background:var(--acc)}

/* Chat list items */
.cla{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:14px;padding:10px 16px;border-bottom:1px solid var(--brd);cursor:pointer;position:relative}
.ci:active{background:var(--bg3)}
.ci.archived{opacity:.5}
.cii{flex:1;min-width:0}
.cin{color:var(--tx);font-weight:500;font-size:16px;display:flex;align-items:center;gap:6px}
.cin .muted-icon{opacity:.4;font-size:13px}
.cip{color:var(--tx3);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;font-weight:400}
.cip.unread{color:var(--tx);font-weight:500}
.cit{color:var(--tx3);font-size:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-weight:400}
.badge{background:var(--acc);color:#fff;font-size:12px;font-weight:500;padding:2px 7px;border-radius:12px;min-width:22px;text-align:center}
.nb{position:absolute;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.5);display:flex;align-items:center;justify-content:center;z-index:5}

/* Messages */
.ma{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch}
.dd{text-align:center;margin:10px 0 6px;color:var(--tx3);font-size:13px;font-weight:500}
.dd span{background:var(--bg3);padding:4px 14px;border-radius:16px}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.me{flex-direction:row-reverse}
.mr.gt{margin-top:6px}
.mac{width:32px;flex-shrink:0}
.mc{max-width:78%;display:flex;flex-direction:column}
.mr.me .mc{align-items:flex-end}
.ms{font-size:13px;font-weight:500;margin-bottom:2px;margin-left:10px}
.mb{padding:8px 12px;color:var(--tx);font-size:15px;line-height:1.45;word-break:break-word;animation:ma .2s ease-out;position:relative;font-weight:400}
@keyframes ma{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mb.ot{background:var(--bg3);border-radius:16px 16px 16px 4px}
.mb.mn{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:16px 16px 4px 16px;box-shadow:0 2px 10px rgba(102,126,234,.2);color:#fff}
.mt{font-size:11px;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:4px;font-weight:400}
.mt.ot{color:var(--tx3)}.mt.mn{color:rgba(255,255,255,.6)}
.ck{font-size:13px}
.ck.read{color:#55EFC4}
.mi{max-width:100%;border-radius:10px;margin-bottom:3px;cursor:pointer}
.mq{background:rgba(102,126,234,.12);border-left:3px solid var(--acc);border-radius:4px;padding:6px 10px;margin-bottom:4px;font-size:14px}
.mqn{font-weight:500;font-size:12px;margin-bottom:1px}
.mqt{opacity:.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:400}
.med{color:var(--tx2);font-size:11px;font-style:italic;font-weight:400}
.mrc{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mrc-i{background:var(--bg3);border-radius:12px;padding:2px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:3px;border:1px solid transparent;transition:all .15s}
.mrc-i:active{border-color:var(--acc)}
.mrc-i .cnt{font-size:12px;color:var(--tx2);font-weight:400}
.m-link{color:#74B9FF;text-decoration:underline}
.m-audio{display:flex;align-items:center;gap:10px;min-width:200px;padding:6px 4px;position:relative}
.m-audio-play{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.95);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.m-audio-play svg{margin-left:2px}
.m-audio-play.paused svg{margin-left:0}
.m-audio-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.m-audio-wave{display:flex;align-items:center;gap:1.5px;height:24px}
.m-audio-wave-bar{width:2.5px;border-radius:2px;background:rgba(255,255,255,.5);transition:background .1s}
.m-audio-wave-bar.played{background:rgba(255,255,255,.9)}
.m-audio-dur{font-size:13px;color:rgba(255,255,255,.7);font-weight:400;display:flex;align-items:center;gap:4px}
.m-audio-unread{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.8);flex-shrink:0}
.m-audio-trans{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:2px 8px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer;font-weight:500;font-family:'Roboto',sans-serif}
.m-audio-trans:active{background:rgba(255,255,255,.35)}
.m-audio-prog{display:none}
.mb.mn .m-audio-play svg{fill:#E85D75}
.mb.ot .m-audio-play svg{fill:var(--acc)}
/* Gradient background for voice message bubble */
.mb.voice-msg{padding:8px 10px}
.mb.voice-msg.mn{background:linear-gradient(135deg,#E85D75,#764ba2,#667eea);box-shadow:0 2px 12px rgba(118,75,162,.3)}
.mb.voice-msg.ot{background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 2px 12px rgba(102,126,234,.2)}
.m-file{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
.m-file-icon{font-size:24px}
.m-file-name{color:var(--acc);font-size:14px;font-weight:500;word-break:break-all}
.m-file-size{font-size:12px;color:var(--tx3);font-weight:400}
.m-poll{padding:4px 0}
.m-poll-q{font-weight:500;font-size:15px;margin-bottom:6px}
.m-poll-opt{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer}
.m-poll-bar{flex:1;height:26px;background:var(--bg3);border-radius:8px;overflow:hidden;position:relative}
.m-poll-fill{height:100%;background:rgba(102,126,234,.3);border-radius:8px;transition:width .3s}
.m-poll-label{position:absolute;top:5px;left:8px;font-size:13px;color:var(--tx);z-index:1;font-weight:400}
.m-poll-pct{font-size:13px;color:var(--tx2);min-width:32px;text-align:right;font-weight:400}
.m-loc{border-radius:10px;overflow:hidden;margin-bottom:3px}
.m-loc img{width:100%;height:120px;object-fit:cover}
.m-fwd{color:var(--tx2);font-size:12px;font-style:italic;margin-bottom:3px;font-weight:400}
.m-thread{color:var(--acc);font-size:13px;cursor:pointer;margin-top:3px;font-weight:500}
.m-disappear{opacity:.7}
.m-sched{border:1px dashed var(--acc);opacity:.6}

/* Input bar - Telegram style */
.inb{padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--brd);display:flex;gap:8px;align-items:center;backdrop-filter:blur(20px);flex-shrink:0;position:relative}
.inw{flex:1;background:var(--bg3);border-radius:22px;display:flex;align-items:center;padding:0 4px}
.inw-rec{padding:0 16px;gap:10px}
.min{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;padding:10px 8px;min-width:0;font-weight:400}
.min::placeholder{color:var(--tx3)}
.ini{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;padding:0;flex-shrink:0}
.ini:active{background:var(--bg3)}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#E85D75;flex-shrink:0;animation:rp 1s infinite}
.rec-timer{color:var(--tx);font-size:16px;font-weight:500;min-width:50px;padding:10px 0}
.rec-cancel-text{color:var(--acc);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-left:auto;cursor:pointer;transition:color .15s,transform .15s}
.rec-cancel-text.danger{color:#E85D75;transform:scale(1.1)}
.rb-main{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:#5b7cfa;box-shadow:0 2px 10px rgba(91,124,250,.4);transition:all .15s;touch-action:none;-webkit-user-select:none;user-select:none}
.rb-main:active{transform:scale(.9)}
.sb{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 2px 10px rgba(102,126,234,.3);transition:all .15s}
.sb:active{transform:scale(.9)}
.rec-tooltip{position:absolute;bottom:60px;right:8px;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--tx);max-width:260px;z-index:16;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:ca .15s ease-out}
.rec-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rec-btn:active{background:var(--bg3)}
.rec-btn.recording{background:rgba(232,93,117,.2);animation:rp 1s infinite}

/* Video message */
.m-vidmsg{width:200px;height:200px;border-radius:50%;overflow:hidden;cursor:pointer;position:relative;background:#000}
.m-vidmsg video{width:100%;height:100%;object-fit:cover}
.m-vidmsg-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center}
.m-vidmsg-dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:8px}

/* Video record overlay */
.vrec-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:35;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.vrec-preview{width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid var(--acc)}
.vrec-preview video{width:100%;height:100%;object-fit:cover}
.vrec-timer{color:#fff;font-size:18px;font-weight:600}
.vrec-btns{display:flex;gap:20px}
.vrec-stop{width:56px;height:56px;border-radius:50%;background:var(--red);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vrec-cancel{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
@keyframes rp{0%,100%{opacity:1}50%{opacity:.5}}

/* Reply/Edit bar */
.rb{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(102,126,234,.08);border-top:1px solid rgba(102,126,234,.15)}
.rbc{flex:1;min-width:0}.rbn{color:var(--acc);font-size:13px;font-weight:500}.rbt{color:var(--tx2);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.rbx{background:none;border:none;cursor:pointer;padding:4px}

/* Pinned bar */
.pnb{padding:6px 12px;background:rgba(102,126,234,.06);border-bottom:1px solid rgba(102,126,234,.1);display:flex;align-items:center;gap:6px}
.pnb-t{flex:1;color:var(--acc);font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Search */
.srb{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;gap:6px;align-items:center}
.sri{flex:1;background:var(--bg3);border:none;border-radius:20px;padding:8px 16px;color:var(--tx);font-size:15px;outline:none;font-weight:400}
.sri::placeholder{color:var(--tx3)}

/* Emoji panel */
.ep{display:none;position:absolute;bottom:55px;left:6px;right:6px;background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:6px;z-index:15;max-height:200px;overflow-y:auto;backdrop-filter:blur(20px)}
.ep.open{display:block}
.ec{display:flex;gap:2px;padding:2px 2px 6px;border-bottom:1px solid var(--brd);margin-bottom:6px;overflow-x:auto}
.ecb{background:none;border:none;cursor:pointer;font-size:16px;padding:3px 6px;border-radius:6px;opacity:.5;flex-shrink:0}
.ecb.act{opacity:1;background:var(--bg3)}
.eg{display:grid;grid-template-columns:repeat(8,1fr);gap:1px}
.ei{font-size:20px;padding:4px;text-align:center;cursor:pointer;border-radius:6px}
.ei:active{background:var(--bg3)}

/* Context menu */
.ctx{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:3px;z-index:30;min-width:170px;backdrop-filter:blur(20px);animation:ca .12s ease-out;max-height:80vh;overflow-y:auto}
@keyframes ca{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cti{display:flex;align-items:center;gap:8px;padding:10px 14px;color:var(--tx);font-size:15px;cursor:pointer;border-radius:8px;font-weight:400}
.cti:active{background:var(--bg3)}
.cto{position:fixed;top:0;left:0;right:0;bottom:0;z-index:29}
/* Select mode */
.sel-cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-right:4px}
.sel-cb.checked{background:var(--acc);border-color:var(--acc)}
.sel-cb.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.sel-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px)}
.sel-hdr-count{color:var(--tx);font-weight:500;font-size:18px;flex:1}
.mr.selectable{cursor:pointer}

/* Sidebar */
.so{position:absolute;top:0;left:0;right:0;bottom:0;z-index:20;display:flex}
.sd{width:280px;background:var(--bg2);border-right:1px solid var(--brd);padding:20px 16px;backdrop-filter:blur(20px);overflow-y:auto}
.sd-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;color:var(--tx);font-size:15px;cursor:pointer;font-weight:400}
.sd-row:active{opacity:.7}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg3);position:relative;cursor:pointer;border:none;transition:background .2s}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:20px}
.sdl{color:var(--tx2);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.sdi{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer}
.sdi:active{opacity:.7}
.lbtn{margin-top:12px;width:100%;padding:12px;border-radius:10px;border:1px solid rgba(232,93,117,.3);background:rgba(232,93,117,.1);color:var(--red);font-size:15px;font-weight:500;cursor:pointer}
.sdbk{flex:1}

/* Overlays */
.ov{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:25;display:flex;flex-direction:column}
.ov-h{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd)}
.ov-t{color:var(--tx);font-weight:500;font-size:18px;flex:1}
.ov-list{flex:1;overflow-y:auto;padding:8px 0}
.ov-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer}
.ov-item:active{background:var(--bg3)}

.call-btns-inc{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:space-around;z-index:41;padding:0 60px}

.cb{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.cb:active{transform:scale(.88)}
.cb-sm{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}

// Play audio — play/pause toggle
var currentAudio=null,currentAudioBtn=null;
var playSvg='<svg width="20" height="20" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21"/></svg>';
var pauseSvg='<svg width="20" height="20" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/></svg>';
window.playA=function(btn){
var container=btn.closest('.m-audio');
if(!container)return;
var src=container.getAttribute('data-src');
if(!src)return;

// If same audio playing — pause
if(currentAudio&&currentAudioBtn===btn&&!currentAudio.paused){
  currentAudio.pause();
  btn.innerHTML=playSvg;btn.classList.remove('paused');
  return;
}
// If different audio playing — stop old
if(currentAudio&&currentAudioBtn!==btn){
  currentAudio.pause();currentAudio.currentTime=0;
  currentAudioBtn.innerHTML=playSvg;currentAudioBtn.classList.remove('paused');
}
// If same audio paused — resume
if(currentAudio&&currentAudioBtn===btn&&currentAudio.paused){
  currentAudio.play();
  btn.innerHTML=pauseSvg;btn.classList.add('paused');
  return;
}
// New audio
var a=new Audio(src);
currentAudio=a;currentAudioBtn=btn;
btn.innerHTML=pauseSvg;btn.classList.add('paused');

var bars=container.querySelectorAll('.m-audio-wave-bar');
var totalBars=bars.length;

a.addEventListener('timeupdate',function(){
  if(!a.duration)return;
  var pct=a.currentTime/a.duration;
  var playedCount=Math.floor(pct*totalBars);
  bars.forEach(function(b,i){b.classList.toggle('played',i<playedCount)});
});
a.addEventListener('ended',function(){
  btn.innerHTML=playSvg;btn.classList.remove('paused');
  bars.forEach(function(b){b.classList.remove('played')});
  // Mark as listened — remove unread dot
  var dot=container.querySelector('.m-audio-unread');if(dot)dot.style.display='none';
  currentAudio=null;currentAudioBtn=null;
});
a.play();
};

// Record button logic:
// Short tap (<500ms) = toggle mode audio↔video + tooltip
// Hold (>=500ms) = start recording, release = stop & send
// Swipe left = cancel (with visual feedback), Swipe up = lock mode
var recPressStart=0,recHoldTimer=null,recIsHolding=false;
function recBegin(){
recPressStart=Date.now();recIsHolding=false;
recHoldTimer=setTimeout(function(){
  recIsHolding=true;
  vibrate(50);
  if(recMode==='audio')startAudioRec();else startVideoRec();
},500);
}
function recEnd(){
clearTimeout(recHoldTimer);
var dur=Date.now()-recPressStart;
if(!recIsHolding&&dur<500&&dur>0){
  // Short tap (<500ms) — toggle mode
  vibrate(30);
  if(recMode==='audio'){
    recMode='video';updateRecIcon();
    showRecTooltip('Удерживайте для записи видео. Нажмите для переключения в голосовой режим.');
  }else{
    recMode='audio';updateRecIcon();
    showRecTooltip('Удерживайте для записи звука. Нажмите для переключения на видео.');
  }
}
// If recording started — do NOT stop on release. User uses ➤ or ОТМЕНА.
recPressStart=0;recIsHolding=false;
}

// ➤ button: when recording, tap sends. When not recording, normal send.
function recBtnTap(){
if(isRecording()){
  // Stop recording and send
  if(recMode==='audio')stopAudioRec();
  else stopVideoRec();
}
}

}
});

// ontrack handler — separates audio and video
function setupOntrack(){
var remoteStream=new MediaStream();
callPC.ontrack=function(e){
  remoteStream.addTrack(e.track);
  if(e.track.kind==='video'){
    $('remoteVid').srcObject=remoteStream;$('remoteVid').classList.remove('hidden');
    if($('callAvSection'))$('callAvSection').style.display='none';
    e.track.onmute=function(){$('remoteVid').classList.add('hidden');if($('callAvSection'))$('callAvSection').style.display=''};
    e.track.onunmute=function(){$('remoteVid').classList.remove('hidden');if($('callAvSection'))$('callAvSection').style.display='none'}
  }
  if(e.track.kind==='audio'){
    var ra=document.getElementById('rAudio');if(ra)ra.remove();
    var a=document.createElement('audio');a.id='rAudio';a.autoplay=true;a.srcObject=new MediaStream([e.track]);
    a.volume=callSpeaker?1:.15;document.body.appendChild(a)
  }
}}

// Update call UI based on video on/off
function updateCallVideoUI(){
var sec=$('callAvSection'),tb=$('callTopbar'),tn=$('callTopName'),ts=$('callTopStatus');
// Outgoing buttons: swap speaker↔flip
var sw=$('callSpkWrap'),fw=$('callFlipWrap');
var swA=$('callSpkWrapA'),fwA=$('callFlipWrapA');
if(callVideo){

  if(sec)sec.style.display='none';

  // Audio mode: show avatar, hide topbar, hide local video, show speaker
  if(sec)sec.style.display='';
  tb.style.display='none';
  $('localVid').classList.add('hidden');
  if(sw)sw.classList.remove('hidden');if(fw)fw.classList.add('hidden');
  if(swA)swA.classList.remove('hidden');if(fwA)fwA.classList.add('hidden');
}}
window.startCall=function(target,withVideo){
if(callActive)return;callPeer=target;callRole='caller';callActive=true;callVideo=!!withVideo;
var cid=U+'__to__'+target+'__'+Date.now();callRef=db.ref('calls/'+cid);showCallUI(target,false);startRing();
var constraints=withVideo?{audio:true,video:{facingMode:'user',width:320,height:240}}:{audio:true};
navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
callStream=stream;
if(withVideo){$('localVid').srcObject=stream;$('localVid').classList.remove('hidden')}
$('callVO').classList.toggle('a',callVideo);updateCallVideoUI();
callPC=new RTCPeerConnection(iceS);
stream.getTracks().forEach(function(t){callPC.addTrack(t,stream)});
setupOntrack();
callPC.onicecandidate=function(e){if(e.candidate)callRef.child('callerIce').push(e.candidate.toJSON())};
callPC.createOffer().then(function(o){return callPC.setLocalDescription(o)}).then(function(){
callRef.set({from:U,to:target,offer:{type:callPC.localDescription.type,sdp:callPC.localDescription.sdp},status:'ringing',video:!!withVideo,ts:firebase.database.ServerValue.TIMESTAMP});
callRef.child('answer').on('value',function(s){var a=s.val();if(a&&callPC&&callPC.signalingState!=='closed')callPC.setRemoteDescription(new RTCSessionDescription(a)).then(function(){stopRing();showActive()}).catch(function(){})});
callRef.child('calleeIce').on('child_added',function(s){var c=s.val();if(c&&callPC&&callPC.signalingState!=='closed')callPC.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})});
callRef.child('status').on('value',function(s){var v=s.val();if(v==='ended'||v==='declined'){stopRing();endCallClean()}})})
}).catch(function(err){console.error('getUserMedia error:',err);alert('Нет доступа к микрофону. Откройте через HTTPS (GitHub Pages).');endCallClean()})};
function handleInc(cid,data){if(callActive)return;callActive=true;callPeer=data.from;callRole='callee';incomingIsVideo=!!data.video;callRef=db.ref('calls/'+cid);showCallUI(data.from,true);startRing();showNotif('Входящий вызов',data.from+' звонит');
callRef.child('status').on('value',function(s){var v=s.val();if(v==='ended'||v==='cancelled'){stopRing();endCallClean()}})}
function accCall(withVideo){if(!callRef)return;stopRing();
callVideo=!!withVideo;callSpeaker=!!withVideo;
var constraints=withVideo?{audio:true,video:{facingMode:'user',width:320,height:240}}:{audio:true};
navigator.mediaDevices.getUserMedia(constraints).then(function(stream){callStream=stream;
if(withVideo){$('localVid').srcObject=stream;$('localVid').classList.remove('hidden')}
updateCallVideoUI();
callRef.once('value',function(s){var data=s.val();if(!data||!data.offer)return;
callPC=new RTCPeerConnection(iceS);
stream.getTracks().forEach(function(t){callPC.addTrack(t,stream)});
setupOntrack();
callPC.onicecandidate=function(e){if(e.candidate)callRef.child('calleeIce').push(e.candidate.toJSON())};
callPC.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function(){return callPC.createAnswer()}).then(function(a){return callPC.setLocalDescription(a)}).then(function(){
callRef.child('answer').set({type:callPC.localDescription.type,sdp:callPC.localDescription.sdp});callRef.update({status:'active'});showActive();
callRef.child('callerIce').on('child_added',function(s){var c=s.val();if(c&&callPC&&callPC.signalingState!=='closed')callPC.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})})})})
}).catch(function(){alert('Нет доступа к камере/микрофону. Используйте HTTPS.');endCallClean()})}
function endCallClean(){if(callPC){try{callPC.close()}catch(e){}callPC=null}if(callStream){callStream.getTracks().forEach(function(t){t.stop()});callStream=null}var ra=document.getElementById('rAudio');if(ra)ra.remove();if(callRef){callRef.child('answer').off();callRef.child('callerIce').off();callRef.child('calleeIce').off();callRef.child('status').off()}callRef=null;callActive=false;callPeer=null;callRole=null;callMuted=false;callVideo=false;incomingIsVideo=false;$('remoteVid').srcObject=null;$('localVid').srcObject=null;if($('callAvSection'))$('callAvSection').style.display='';hideCallUI();stopRing()}
function listenCalls(){if(callListenerSet)return;callListenerSet=true;db.ref('calls').orderByChild('ts').startAt(Date.now()).on('child_added',function(s){var d=s.val();if(d&&d.to===U&&d.status==='ringing'&&!callActive)handleInc(s.key,d)})}

// Camera toggle
function toggleVid(){if(!callStream)return;
var vt=callStream.getVideoTracks();
if(vt.length>0){
  // Has video track — just toggle enabled
  var ns=!vt[0].enabled;vt.forEach(function(t){t.enabled=ns});callVideo=ns;
  $('callV').classList.toggle('a',ns);$('callVO').classList.toggle('a',ns);
  if(ns){$('localVid').srcObject=callStream;$('localVid').classList.remove('hidden')}
  else{$('localVid').classList.add('hidden')}
  updateCallVideoUI()
}else{
  // No video track — request camera and add to stream+PC
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}}).then(function(vs){
    var nt=vs.getVideoTracks()[0];callStream.addTrack(nt);
    if(callPC){callPC.addTrack(nt,callStream)}
    callVideo=true;$('callV').classList.add('a');$('callVO').classList.add('a');
    $('localVid').srcObject=callStream;$('localVid').classList.remove('hidden');
    updateCallVideoUI()
  }).catch(function(){alert('Нет доступа к камере. Используйте HTTPS.')})
}}
// Flip camera
var facingMode='user';
function flipCamera(){if(!callStream)return;
var vt=callStream.getVideoTracks();if(!vt.length)return;
facingMode=facingMode==='user'?'environment':'user';
vt.forEach(function(t){t.stop()});
navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode,width:320,height:240}}).then(function(s){
var nt=s.getVideoTracks()[0];callStream.removeTrack(vt[0]);callStream.addTrack(nt);
if(callPC){var sender=callPC.getSenders().find(function(x){return x.track&&x.track.kind==='video'});if(sender)sender.replaceTrack(nt)}
$('localVid').srcObject=callStream}).catch(function(){facingMode=facingMode==='user'?'environment':'user'})}
