<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pulse Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0a0a1a;--bg2:rgba(15,12,41,.95);--bg3:rgba(255,255,255,.08);--tx:#fff;--tx2:rgba(255,255,255,.5);--tx3:rgba(255,255,255,.3);--acc:#667eea;--acc2:#764ba2;--brd:rgba(255,255,255,.06);--grn:#00b894;--red:#E85D75}
[data-theme="light"]{--bg:#f0f2f5;--bg2:rgba(255,255,255,.95);--bg3:rgba(0,0,0,.06);--tx:#1a1a2e;--tx2:rgba(0,0,0,.5);--tx3:rgba(0,0,0,.3);--brd:rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#000;height:100dvh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;height:100dvh;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);background:var(--bg)}
button,input{-webkit-appearance:none;touch-action:manipulation;font-family:'DM Sans',sans-serif}

/* Login */
.ls{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);padding:24px}
.ll{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:0 8px 32px rgba(102,126,234,.4);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.lt{color:#fff;font-size:28px;font-weight:800;margin-bottom:8px}
.lsb{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:40px}
.li{width:100%;max-width:320px;padding:16px 20px;font-size:16px;border-radius:16px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;outline:none;transition:border-color .2s}
.li:focus{border-color:rgba(102,126,234,.6)}
.li::placeholder{color:rgba(255,255,255,.3)}
.lb{margin-top:16px;width:100%;max-width:320px;padding:16px;font-size:16px;font-weight:700;border-radius:16px;border:none;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.1);color:rgba(255,255,255,.3)}
.lb.a{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 20px rgba(102,126,234,.4)}
.pin-row{display:flex;gap:8px;margin-top:16px;width:100%;max-width:320px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .2s}
.pin-dot.f{background:var(--acc);border-color:var(--acc)}
.pin-kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:24px;width:100%;max-width:280px}
.pin-k{padding:16px;font-size:22px;font-weight:700;border-radius:16px;border:none;background:rgba(255,255,255,.07);color:#fff;cursor:pointer;text-align:center}
.pin-k:active{background:rgba(255,255,255,.15)}
.pin-k.del{font-size:14px}

/* Chat list */
.cls{height:100%;display:flex;flex-direction:column;background:var(--bg);position:relative}
.clh{padding:14px 16px;display:flex;align-items:center;gap:12px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px);flex-shrink:0}
.clt{color:var(--tx);font-weight:800;font-size:20px;flex:1}
.cla{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--brd);cursor:pointer}
.ci:active{background:var(--bg3)}
.cii{flex:1;min-width:0}
.cin{color:var(--tx);font-weight:600;font-size:15px}
.cip{color:var(--tx3);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cit{color:var(--tx3);font-size:11px;flex-shrink:0}
.nb{position:absolute;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.5);display:flex;align-items:center;justify-content:center;z-index:5}

/* Chat */
.chs{height:100%;display:flex;flex-direction:column;background:var(--bg)}
.chh{padding:10px 8px 10px 4px;display:flex;align-items:center;gap:6px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px);z-index:10;flex-shrink:0}
.bb{background:none;border:none;cursor:pointer;padding:8px}
.hi{flex:1}
.ht{color:var(--tx);font-weight:700;font-size:16px}
.hs{color:var(--tx2);font-size:11px;margin-top:1px}
.hs.tp{color:var(--acc)}
.ib{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:none}
.ib:active{background:var(--bg3)}

/* Pinned bar */
.pnb{padding:8px 12px;background:rgba(102,126,234,.08);border-bottom:1px solid rgba(102,126,234,.15);display:flex;align-items:center;gap:8px;cursor:pointer}
.pnb-t{flex:1;color:var(--acc);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pnb-x{background:none;border:none;cursor:pointer;padding:2px}

/* Search bar */
.srb{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;gap:8px;align-items:center}
.sri{flex:1;background:var(--bg3);border:none;border-radius:16px;padding:8px 14px;color:var(--tx);font-size:14px;outline:none}
.sri::placeholder{color:var(--tx3)}

.ma{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch}
.es{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.dd{text-align:center;margin:12px 0 8px;color:var(--tx3);font-size:12px;font-weight:600}
.dd span{background:var(--bg3);padding:4px 14px;border-radius:20px}
.mr{display:flex;align-items:flex-end;gap:8px}
.mr.me{flex-direction:row-reverse}
.mr.gt{margin-top:8px}
.mac{width:32px;flex-shrink:0}
.mc{max-width:75%;display:flex;flex-direction:column}
.mr.me .mc{align-items:flex-end}
.ms{font-size:12px;font-weight:700;margin-bottom:2px;margin-left:12px}
.mb{padding:10px 14px;color:var(--tx);font-size:15px;line-height:1.45;word-break:break-word;animation:maa .25s ease-out;position:relative}
@keyframes maa{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mb.ot{background:var(--bg3);border-radius:18px 18px 18px 4px}
.mb.mn{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:18px 18px 4px 18px;box-shadow:0 2px 12px rgba(102,126,234,.25);color:#fff}
.mt{font-size:10px;margin-top:4px;text-align:right}
.mt.ot{color:var(--tx3)}
.mt.mn{color:rgba(255,255,255,.6)}
.mi{max-width:100%;border-radius:12px;margin-bottom:4px;cursor:pointer}
.mq{background:rgba(102,126,234,.15);border-left:3px solid var(--acc);border-radius:4px;padding:6px 10px;margin-bottom:6px;font-size:13px}
.mqn{font-weight:700;font-size:11px;margin-bottom:2px}
.mqt{opacity:.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.med{color:var(--tx2);font-size:10px;font-style:italic}
.mrc{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mrc-i{background:var(--bg3);border-radius:12px;padding:2px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:3px;border:1px solid transparent;transition:all .15s}
.mrc-i:active{border-color:var(--acc)}
.mrc-i .cnt{font-size:11px;color:var(--tx2)}
.m-link{color:#74B9FF;text-decoration:underline}
.m-audio{display:flex;align-items:center;gap:8px;min-width:180px}
.m-audio button{background:none;border:none;cursor:pointer;padding:0}
.m-audio-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;position:relative;overflow:hidden}
.m-audio-prog{height:100%;background:var(--acc);border-radius:2px;width:0%;transition:width .1s}
.m-audio-dur{font-size:11px;color:var(--tx2);min-width:32px}

/* Reply/Edit bar */
.rb{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(102,126,234,.1);border-top:1px solid rgba(102,126,234,.2)}
.rbc{flex:1;min-width:0}
.rbn{color:var(--acc);font-size:12px;font-weight:700}
.rbt{color:var(--tx2);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbx{background:none;border:none;cursor:pointer;padding:4px}

/* Input */
.inb{padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--brd);display:flex;gap:6px;align-items:flex-end;backdrop-filter:blur(20px);flex-shrink:0}
.inw{flex:1;background:var(--bg3);border-radius:22px;display:flex;align-items:center}
.min{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;padding:10px 14px}
.min::placeholder{color:var(--tx3)}
.sb{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;background:var(--bg3)}
.sb.a{background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 2px 12px rgba(102,126,234,.4)}
.rec-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%}
.rec-btn.recording{background:rgba(232,93,117,.2);animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Emoji */
.ep{display:none;position:absolute;bottom:60px;left:8px;right:8px;background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:8px;z-index:15;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(20px)}
.ep.open{display:block}
.ec{display:flex;gap:4px;padding:4px 4px 8px;border-bottom:1px solid var(--brd);margin-bottom:8px;overflow-x:auto}
.ecb{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:8px;opacity:.5;flex-shrink:0}
.ecb.act{opacity:1;background:var(--bg3)}
.eg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.ei{font-size:22px;padding:6px;text-align:center;cursor:pointer;border-radius:8px}
.ei:active{background:var(--bg3)}

/* Quick react */
.qr{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--brd);border-radius:24px;padding:4px 8px;position:absolute;z-index:16;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:maa .15s ease-out}
.qr-i{font-size:20px;cursor:pointer;padding:4px;border-radius:8px}
.qr-i:active{background:var(--bg3)}

/* Context menu */
.ctx{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:4px;z-index:30;min-width:180px;backdrop-filter:blur(20px);animation:ca .15s ease-out}
@keyframes ca{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cti{display:flex;align-items:center;gap:10px;padding:10px 14px;color:var(--tx);font-size:14px;cursor:pointer;border-radius:8px}
.cti:active{background:var(--bg3)}
.cto{position:fixed;top:0;left:0;right:0;bottom:0;z-index:29}

/* Sidebar */
.so{position:absolute;top:0;left:0;right:0;bottom:0;z-index:20;display:flex}
.sd{width:280px;background:var(--bg2);border-right:1px solid var(--brd);padding:24px 20px;backdrop-filter:blur(20px);overflow-y:auto}
.sdn{color:var(--tx);font-weight:700;font-size:18px;margin-top:12px}
.sdst{color:var(--tx2);font-size:13px;margin-top:4px}
.sdl{color:var(--tx2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:24px 0 12px}
.sdi{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer}
.sdi:active{opacity:.7}
.sdin{color:var(--tx);font-size:14px;font-weight:600}
.sdiy{color:var(--tx3);font-weight:400}
.od{width:6px;height:6px;border-radius:50%;background:var(--grn);display:inline-block}
.olb{color:var(--grn);font-size:11px}
.lbtn{margin-top:16px;width:100%;padding:12px;border-radius:12px;border:1px solid rgba(232,93,117,.3);background:rgba(232,93,117,.1);color:var(--red);font-size:14px;font-weight:600;cursor:pointer}
.sdbk{flex:1}
.sd-sect{padding:12px 0;border-top:1px solid var(--brd);margin-top:12px}
.sd-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;color:var(--tx);font-size:14px;cursor:pointer}
.sd-row:active{opacity:.7}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg3);position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:22px}

/* User picker */
.up{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:25;display:flex;flex-direction:column}
.uph{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.upt{color:var(--tx);font-weight:700;font-size:17px;flex:1}
.upl{flex:1;overflow-y:auto;padding:8px 0}
.upi{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer}
.upi:active{background:var(--bg3)}
.upn{color:var(--tx);font-size:15px;font-weight:600}
.upi-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.upi-cb.sel{background:var(--acc);border-color:var(--acc)}
.up-done{margin:12px 16px;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* Profile edit */
.pe{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:25;display:flex;flex-direction:column}
.peh{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.pet{color:var(--tx);font-weight:700;font-size:17px;flex:1}
.pec{display:flex;flex-direction:column;align-items:center;padding:24px;gap:12px}
.pe-av{width:96px;height:96px;border-radius:50%;cursor:pointer;overflow:hidden;position:relative}
.pe-av img{width:100%;height:100%;object-fit:cover}
.pe-av-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;text-align:center;padding:4px}
.pe-input{width:100%;max-width:300px;padding:12px 16px;border-radius:12px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:15px;outline:none}
.pe-input::placeholder{color:var(--tx3)}
.pe-label{color:var(--tx2);font-size:12px;font-weight:600;text-transform:uppercase;margin-top:16px;width:100%;max-width:300px}
.pe-save{margin-top:24px;padding:14px 48px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:15px;font-weight:700;cursor:pointer}

/* Call */
.cs{position:absolute;top:0;left:0;right:0;bottom:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);gap:16px}
.ca{animation:cp 2s ease-in-out infinite}
@keyframes cp{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(102,126,234,.4)}50%{transform:scale(1.05);box-shadow:0 0 0 20px rgba(102,126,234,0)}}
.cnm{color:#fff;font-size:24px;font-weight:800}
.cst{color:rgba(255,255,255,.5);font-size:14px}
.ctm{color:rgba(255,255,255,.7);font-size:18px;font-weight:600;font-variant-numeric:tabular-nums}
.cbs{display:flex;gap:24px;margin-top:32px}
.cb{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb:active{transform:scale(.9)}
.cb.acc{background:var(--grn);box-shadow:0 4px 20px rgba(0,184,148,.4)}
.cb.dec{background:var(--red);box-shadow:0 4px 20px rgba(232,93,117,.4)}
.cb.mut{background:rgba(255,255,255,.15)}
.cb.mut.a{background:rgba(255,255,255,.3)}

/* Image viewer */
.iv{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:50;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iv img{max-width:95%;max-height:90%;object-fit:contain}

.hidden{display:none!important}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-family:'DM Sans',sans-serif;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>
<div id="app">

<!-- PIN screen -->
<div class="ls hidden" id="SP">
  <div class="ll"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <div class="lt">Введите PIN</div>
  <div class="lsb" id="pinMsg">4-значный код</div>
  <div style="display:flex;gap:12px;margin-bottom:24px" id="pinDots"></div>
  <div class="pin-kb" id="pinKb"></div>
</div>

<!-- Login -->
<div class="ls" id="S0">
  <div class="ll"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
  <div class="lt">Pulse Chat</div>
  <div class="lsb">Мгновенные сообщения для всех</div>
  <input class="li" id="ni" placeholder="Ваше имя" maxlength="20" autocomplete="off">
  <button type="button" class="lb" id="lbn">Войти в чат →</button>
</div>

<!-- Chat List -->
<div class="cls hidden" id="S1">
  <div class="clh">
    <div class="clt">Pulse Chat</div>
    <button type="button" class="ib" id="srBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--tx2)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    <button type="button" class="ib" id="clmb"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--tx2)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
  </div>
  <div class="cla" id="cla"></div>
  <button type="button" class="nb" id="nb"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  <!-- Sidebar -->
  <div class="so hidden" id="sov">
    <div class="sd">
      <div id="sav" style="cursor:pointer"></div>
      <div class="sdn" id="snm"></div>
      <div class="sdst" id="sStatus"></div>
      <div class="sd-sect">
        <div class="sd-row" id="profBtn">✏️ Редактировать профиль</div>
        <div class="sd-row" id="pinSetBtn">🔒 Установить PIN</div>
        <div class="sd-row">🎨 Тема <button type="button" class="toggle" id="themeT"></button></div>
      </div>
      <div class="sdl" id="slb">Онлайн (0)</div>
      <div id="sml"></div>
      <button type="button" class="lbtn" id="lob">Выйти</button>
    </div>
    <div class="sdbk" id="sbk"></div>
  </div>
  <!-- User picker -->
  <div class="up hidden" id="upk">
    <div class="uph">
      <button type="button" class="bb" id="upc"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--tx)" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="upt" id="upTitle">Новый чат</div>
    </div>
    <div class="upl" id="upl"></div>
    <button type="button" class="up-done hidden" id="upDone">Создать группу</button>
  </div>
  <!-- Profile edit -->

function showCallUI(n,inc){$('callAv').innerHTML=av(n,96);$('callNm').textContent=n;$('callSt').textContent=inc?'Входящий вызов...':'Вызов...';$('callTm').classList.add('hidden');$('callA').classList.toggle('hidden',!inc);$('callM').classList.add('hidden');$('callScr').classList.remove('hidden');callMuted=false}

window.startCall=function(target){
  if(callActive)return;callPeer=target;callRole='caller';callActive=true;
  var cid=U+'__to__'+target+'__'+Date.now();callRef=db.ref('calls/'+cid);showCallUI(target,false);startRing();
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
    callStream=stream;callPC=new RTCPeerConnection(iceS);stream.getTracks().forEach(function(t){callPC.addTrack(t,stream)});
    callPC.ontrack=function(e){var a=document.createElement('audio');a.srcObject=e.streams[0];a.autoplay=true;a.id='rAudio';document.body.appendChild(a)};
    callPC.onicecandidate=function(e){if(e.candidate)callRef.child('callerIce').push(e.candidate.toJSON())};
    callPC.createOffer().then(function(o){return callPC.setLocalDescription(o)}).then(function(){
      callRef.set({from:U,to:target,offer:{type:callPC.localDescription.type,sdp:callPC.localDescription.sdp},status:'ringing',ts:firebase.database.ServerValue.TIMESTAMP});
      callRef.child('answer').on('value',function(s){var a=s.val();if(a&&callPC&&callPC.signalingState!=='closed')callPC.setRemoteDescription(new RTCSessionDescription(a)).then(function(){stopRing();showActive()}).catch(function(){})});
      callRef.child('calleeIce').on('child_added',function(s){var c=s.val();if(c&&callPC&&callPC.signalingState!=='closed')callPC.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})});
      callRef.child('status').on('value',function(s){if(s.val()==='ended'||s.val()==='declined'){stopRing();endCallClean()}})
    })
  }).catch(function(){alert('Нет доступа к микрофону');endCallClean()})
};

function accCall(){if(!callRef)return;stopRing();navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
  callStream=stream;callRef.once('value',function(s){var data=s.val();if(!data||!data.offer)return;callPC=new RTCPeerConnection(iceS);stream.getTracks().forEach(function(t){callPC.addTrack(t,stream)});
    callPC.ontrack=function(e){var a=document.createElement('audio');a.srcObject=e.streams[0];a.autoplay=true;a.id='rAudio';document.body.appendChild(a)};
    callPC.onicecandidate=function(e){if(e.candidate)callRef.child('calleeIce').push(e.candidate.toJSON())};
    callPC.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function(){return callPC.createAnswer()}).then(function(a){return callPC.setLocalDescription(a)}).then(function(){
      callRef.child('answer').set({type:callPC.localDescription.type,sdp:callPC.localDescription.sdp});callRef.update({status:'active'});showActive();
      callRef.child('callerIce').on('child_added',function(s){var c=s.val();if(c&&callPC&&callPC.signalingState!=='closed')callPC.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})})})})
}).catch(function(){alert('Нет доступа к микрофону');endCallClean()})}
function endCallClean(){if(callPC){try{callPC.close()}catch(e){}callPC=null}if(callStream){callStream.getTracks().forEach(function(t){t.stop()});callStream=null}var ra=document.getElementById('rAudio');if(ra)ra.remove();if(callRef){callRef.child('answer').off();callRef.child('callerIce').off();callRef.child('calleeIce').off();callRef.child('status').off()}callRef=null;callActive=false;callPeer=null;callRole=null;callMuted=false;hideCallUI();stopRing()}
