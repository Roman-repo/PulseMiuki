<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мост</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<style>
:root{--bg:#0a0a1a;--bg2:rgba(15,12,41,.95);--bg3:rgba(255,255,255,.08);--tx:#fff;--tx2:rgba(255,255,255,.5);--tx3:rgba(255,255,255,.3);--acc:#667eea;--acc2:#764ba2;--brd:rgba(255,255,255,.06);--grn:#00b894;--red:#E85D75}
[data-theme="light"]{--bg:#f0f2f5;--bg2:rgba(255,255,255,.95);--bg3:rgba(0,0,0,.06);--tx:#1a1a2e;--tx2:rgba(0,0,0,.5);--tx3:rgba(0,0,0,.3);--brd:rgba(0,0,0,.08);--acc:#667eea;--acc2:#764ba2;--grn:#00b894;--red:#E85D75}
[data-theme="madmax"]{--bg:#1a1008;--bg2:rgba(40,25,10,.95);--bg3:rgba(255,150,50,.1);--tx:#f0d0a0;--tx2:rgba(240,180,100,.5);--tx3:rgba(240,180,100,.3);--brd:rgba(255,120,30,.12);--acc:#e8600a;--acc2:#b8340a;--grn:#c4a035;--red:#c43030}
[data-theme="space"]{--bg:#06050f;--bg2:rgba(10,8,30,.95);--bg3:rgba(0,220,255,.08);--tx:#c8e0ff;--tx2:rgba(150,200,255,.5);--tx3:rgba(150,200,255,.3);--brd:rgba(0,180,255,.1);--acc:#00d4ff;--acc2:#7b2fff;--grn:#00ffa3;--red:#ff3075}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;background:#000;height:100dvh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;height:100dvh;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);background:var(--bg)}
button,input,select{-webkit-appearance:none;touch-action:manipulation;font-family:'Roboto',sans-serif}
.hidden{display:none!important}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

/* Screens */
.scr{height:100%;display:flex;flex-direction:column;position:relative}
.ls{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);padding:24px}
[data-theme="madmax"] .ls{background:linear-gradient(160deg,#1a0e00,#3d1f00,#2a1200)}
[data-theme="space"] .ls{background:linear-gradient(160deg,#03010a,#0d0630,#060218)}
.ll{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;margin-bottom:32px;box-shadow:0 8px 32px rgba(102,126,234,.4);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.lt{color:#fff;font-size:24px;font-weight:500;margin-bottom:8px}
.lsb{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:24px;font-weight:400}
.li{width:100%;max-width:320px;padding:14px 20px;font-size:16px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;outline:none;margin-top:10px;font-weight:400}
.li:focus{border-color:rgba(102,126,234,.6)}
.li::placeholder{color:rgba(255,255,255,.3)}
.lb{margin-top:12px;width:100%;max-width:320px;padding:14px;font-size:16px;font-weight:500;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.3)}
.lb.a{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 20px rgba(102,126,234,.4)}
.pin-kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:20px;width:100%;max-width:260px}
.pin-k{padding:14px;font-size:20px;font-weight:700;border-radius:14px;border:none;background:rgba(255,255,255,.07);color:#fff;cursor:pointer;text-align:center}
.pin-k:active{background:rgba(255,255,255,.15)}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.3)}
.pin-dot.f{background:var(--acc);border-color:var(--acc)}

/* Header */
.hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px);flex-shrink:0}
.hdr-t{color:var(--tx);font-weight:600;font-size:20px;flex:1}
.hdr-s{color:var(--tx2);font-size:13px;font-weight:400}
.hdr-s.tp{color:var(--acc)}
.typing-dots span{animation:tdot 1.4s infinite;opacity:.2}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.2}30%{opacity:1}}
.ib{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:none;color:var(--tx)}
.ib:active{background:var(--bg3)}
.ib svg{stroke-width:2.2}
.bb{background:none;border:none;cursor:pointer;padding:6px}

/* Folder tabs - Telegram pill style */
.ftabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--brd);padding:8px 12px;flex-shrink:0;gap:6px;-webkit-overflow-scrolling:touch}
.ftab{padding:7px 18px;font-size:14px;font-weight:500;color:var(--tx2);border:1px solid var(--brd);background:transparent;cursor:pointer;white-space:nowrap;border-radius:20px;flex-shrink:0;font-family:'Roboto',sans-serif}
.ftab.act{color:#fff;background:var(--acc);border-color:var(--acc)}

/* Chat list items */
.cla{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ci{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--brd);cursor:pointer;position:relative}
.ci:active{background:var(--bg3)}
.av-wrap{position:relative;flex-shrink:0}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--grn);border:2px solid var(--bg)}
.ci.archived{opacity:.5}
.cii{flex:1;min-width:0}
.cin{color:var(--tx);font-weight:500;font-size:16px;display:flex;align-items:center;gap:6px}
.cin .muted-icon{opacity:.4;font-size:13px}
.cip{color:var(--tx3);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;font-weight:400}
.cip.unread{color:var(--tx);font-weight:500}
.cit{color:var(--tx3);font-size:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;font-weight:400}
.badge{background:var(--acc);color:#fff;font-size:12px;font-weight:500;padding:2px 7px;border-radius:12px;min-width:22px;text-align:center}
.nb{position:absolute;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.5);display:flex;align-items:center;justify-content:center;z-index:5}
.scroll-bottom{position:absolute;bottom:70px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--bg2);border:1px solid var(--brd);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:4;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:opacity .2s;opacity:.85}
.scroll-bottom:active{opacity:1}

/* Messages */
.ma{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch}
.dd{text-align:center;margin:10px 0 6px;color:var(--tx3);font-size:13px;font-weight:500}
.sys-call{color:var(--tx2);font-size:12px}
.sys-missed{color:var(--red);font-size:12px;font-weight:500}
.sys-unread{background:var(--acc);color:#fff;font-size:12px;font-weight:500;padding:4px 14px;border-radius:16px}
.m-sticker{font-size:56px;line-height:1.1;padding:4px 0}
.ec-tabs{display:flex;gap:4px;width:100%;margin-bottom:4px}
.ect{background:none;border:none;color:var(--tx2);font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer;font-family:'Roboto',sans-serif;font-weight:400}
.ect.act{color:var(--tx);background:var(--bg3);font-weight:500}
.sg{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:4px 0}
.si{font-size:32px;text-align:center;cursor:pointer;padding:6px;border-radius:8px}
.si:active{background:var(--bg3)}
.dd span{background:var(--bg3);padding:4px 14px;border-radius:16px}
.mr{display:flex;align-items:flex-end;gap:6px}
.mr.me{flex-direction:row-reverse}
.mr.gt{margin-top:6px}
.mac{width:32px;flex-shrink:0}
.mc{max-width:78%;display:flex;flex-direction:column}
.mr.me .mc{align-items:flex-end}
.ms{font-size:13px;font-weight:500;margin-bottom:2px;margin-left:10px}
.mb{padding:8px 12px;color:var(--tx);font-size:15px;line-height:1.45;word-break:break-word;animation:ma .2s ease-out;position:relative;font-weight:400}
@keyframes ma{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.mb.ot{background:var(--bg3);border-radius:16px 16px 16px 4px}
.mb.mn{background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:16px 16px 4px 16px;box-shadow:0 2px 10px rgba(102,126,234,.2);color:#fff}
.mt{font-size:11px;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:4px;font-weight:400}
.mt.ot{color:var(--tx3)}.mt.mn{color:rgba(255,255,255,.6)}
.ck{font-size:13px;letter-spacing:-3px;margin-left:2px}
.ck.read{color:#55EFC4}
.mi{max-width:100%;border-radius:10px;margin-bottom:3px;cursor:pointer}
.mq{background:rgba(102,126,234,.12);border-left:3px solid var(--acc);border-radius:4px;padding:6px 10px;margin-bottom:4px;font-size:14px}
.mqn{font-weight:500;font-size:12px;margin-bottom:1px}
.mqt{opacity:.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:400}
.m-readmore,.m-readless{color:var(--acc);cursor:pointer;font-weight:500;font-size:14px}
.med{color:var(--tx2);font-size:11px;font-style:italic;font-weight:400}
.mrc{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.mrc-i{background:var(--bg3);border-radius:12px;padding:2px 8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:3px;border:1px solid transparent;transition:all .15s}
.mrc-i:active{border-color:var(--acc)}
.mrc-i .cnt{font-size:12px;color:var(--tx2);font-weight:400}
.m-link{color:#74B9FF;text-decoration:none}
.m-link-card{display:inline-flex;align-items:center;gap:4px;background:rgba(116,185,255,.12);padding:2px 8px;border-radius:6px;font-size:13px}
.m-audio{display:flex;align-items:center;gap:10px;min-width:200px;padding:6px 4px;position:relative}
.m-audio-play{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.95);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.m-audio-play svg{margin-left:2px}
.m-audio-play.paused svg{margin-left:0}
.m-audio-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.m-audio-wave{display:flex;align-items:center;gap:1.5px;height:24px}
.m-audio-wave-bar{width:2.5px;border-radius:2px;background:rgba(255,255,255,.5);transition:background .1s}
.m-audio-wave-bar.played{background:rgba(255,255,255,.9)}
.m-audio-dur{font-size:13px;color:rgba(255,255,255,.7);font-weight:400;display:flex;align-items:center;gap:4px}
.m-audio-unread{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.8);flex-shrink:0}
.m-audio-trans{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:2px 8px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer;font-weight:500;font-family:'Roboto',sans-serif}
.m-audio-speed{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;font-weight:600;padding:3px 7px;border-radius:8px;cursor:pointer;font-family:'Roboto',sans-serif;flex-shrink:0}
.m-audio-trans:active{background:rgba(255,255,255,.35)}
.m-audio-prog{display:none}
.mb.mn .m-audio-play svg{fill:#E85D75}
.mb.ot .m-audio-play svg{fill:var(--acc)}
/* Gradient background for voice message bubble */
.mb.voice-msg{padding:8px 10px}
.mb.voice-msg.mn{background:linear-gradient(135deg,#E85D75,#764ba2,#667eea);box-shadow:0 2px 12px rgba(118,75,162,.3)}
.mb.voice-msg.ot{background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 2px 12px rgba(102,126,234,.2)}
.m-file{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
.m-file-icon{font-size:24px}
.m-file-name{color:var(--acc);font-size:14px;font-weight:500;word-break:break-all}
.m-file-size{font-size:12px;color:var(--tx3);font-weight:400}
.m-poll{padding:4px 0}
.m-poll-q{font-weight:500;font-size:15px;margin-bottom:6px}
.m-poll-opt{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer}
.m-poll-bar{flex:1;height:26px;background:var(--bg3);border-radius:8px;overflow:hidden;position:relative}
.m-poll-fill{height:100%;background:rgba(102,126,234,.3);border-radius:8px;transition:width .3s}
.m-poll-label{position:absolute;top:5px;left:8px;font-size:13px;color:var(--tx);z-index:1;font-weight:400}
.m-poll-pct{font-size:13px;color:var(--tx2);min-width:32px;text-align:right;font-weight:400}
.m-loc{border-radius:10px;overflow:hidden;margin-bottom:3px}
.m-loc img{width:100%;height:120px;object-fit:cover}
.m-fwd{color:var(--tx2);font-size:12px;font-style:italic;margin-bottom:3px;font-weight:400}
.m-thread{color:var(--acc);font-size:13px;cursor:pointer;margin-top:3px;font-weight:500}
.m-disappear{opacity:.7}
.m-sched{border:1px dashed var(--acc);opacity:.6}

/* Input bar - Telegram style */
.inb{padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--brd);display:flex;gap:8px;align-items:center;backdrop-filter:blur(20px);flex-shrink:0;position:relative}
.inw{flex:1;background:var(--bg3);border-radius:22px;display:flex;align-items:center;padding:0 4px}
.inw-rec{padding:0 16px;gap:10px}
.min{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:16px;padding:10px 8px;min-width:0;font-weight:400}
.min::placeholder{color:var(--tx3)}
.ini{width:34px;height:34px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;padding:0;flex-shrink:0}
.ini:active{background:var(--bg3)}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#E85D75;flex-shrink:0;animation:rp 1s infinite}
.rec-timer{color:var(--tx);font-size:16px;font-weight:500;min-width:50px;padding:10px 0}
.rec-cancel-text{color:var(--acc);font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-left:auto;cursor:pointer;transition:color .15s,transform .15s}
.rb-main{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:#5b7cfa;box-shadow:0 2px 10px rgba(91,124,250,.4);transition:all .15s;touch-action:none;-webkit-user-select:none;user-select:none}
.rb-main:active{transform:scale(.9)}
.sb{width:46px;height:46px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));box-shadow:0 2px 10px rgba(102,126,234,.3);transition:all .15s}
.sb:active{transform:scale(.9)}
.rec-tooltip{position:absolute;bottom:60px;right:8px;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--tx);max-width:260px;z-index:16;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:ca .15s ease-out}
.rec-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rec-btn:active{background:var(--bg3)}
.rec-btn.recording{background:rgba(232,93,117,.2);animation:rp 1s infinite}

/* Video message */
.m-vidmsg{width:200px;height:200px;border-radius:50%;overflow:hidden;cursor:pointer;position:relative;background:#000}
.m-vidmsg video{width:100%;height:100%;object-fit:cover}
.m-vidmsg-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center}
.m-vidmsg-dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 6px;border-radius:8px}

@keyframes rp{0%,100%{opacity:1}50%{opacity:.5}}

/* Reply/Edit bar */
.rb{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--brd)}
.rb-icon{flex-shrink:0;display:flex;align-items:center}
.rbc{flex:1;min-width:0;border-left:3px solid var(--acc);padding-left:8px}.rbn{color:var(--acc);font-size:13px;font-weight:500}.rbt{color:var(--tx2);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.rbx{background:none;border:none;cursor:pointer;padding:4px}

/* Pinned bar */
.pnb{padding:6px 12px;background:rgba(102,126,234,.06);border-bottom:1px solid rgba(102,126,234,.1);display:flex;align-items:center;gap:6px}
.pnb-t{flex:1;color:var(--acc);font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Search */
.srb{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;gap:6px;align-items:center}
.sri{flex:1;background:var(--bg3);border:none;border-radius:20px;padding:8px 16px;color:var(--tx);font-size:15px;outline:none;font-weight:400}
.sri::placeholder{color:var(--tx3)}

/* Emoji panel */
.ep{display:none;position:absolute;bottom:55px;left:6px;right:6px;background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:6px;z-index:15;max-height:200px;overflow-y:auto;backdrop-filter:blur(20px)}
.ep.open{display:block}
.ec{display:flex;gap:2px;padding:2px 2px 6px;border-bottom:1px solid var(--brd);margin-bottom:6px;overflow-x:auto}
.ecb{background:none;border:none;cursor:pointer;font-size:16px;padding:3px 6px;border-radius:6px;opacity:.5;flex-shrink:0}
.ecb.act{opacity:1;background:var(--bg3)}
.eg{display:grid;grid-template-columns:repeat(8,1fr);gap:1px}
.ei{font-size:20px;padding:4px;text-align:center;cursor:pointer;border-radius:6px}
.ei:active{background:var(--bg3)}

/* Context menu */
.ctx{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:3px;z-index:30;min-width:170px;backdrop-filter:blur(20px);animation:ca .12s ease-out;max-height:80vh;overflow-y:auto}
@keyframes ca{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.cti{display:flex;align-items:center;gap:10px;padding:10px 14px;color:var(--tx);font-size:15px;cursor:pointer;border-radius:8px;font-weight:400}
.cti svg{flex-shrink:0;color:var(--tx2)}
.cti:active{background:var(--bg3)}
.cto{position:fixed;top:0;left:0;right:0;bottom:0;z-index:29}
/* Select mode */
.sel-cb{width:24px;height:24px;border-radius:50%;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-right:4px}
.sel-cb.checked{background:var(--acc);border-color:var(--acc)}
.sel-cb.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.sel-hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--bg2);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px)}
.sel-hdr-count{color:var(--tx);font-weight:500;font-size:18px;flex:1}
.mr.selectable{cursor:pointer}

/* Sidebar */
.so{position:absolute;top:0;left:0;right:0;bottom:0;z-index:20;display:flex}
.sd{width:280px;background:var(--bg2);border-right:1px solid var(--brd);padding:20px 16px;backdrop-filter:blur(20px);overflow-y:auto}
.sd-profile{display:flex;align-items:center;gap:12px;cursor:pointer;padding-bottom:14px}
.sd-profile-info{flex:1;min-width:0}
.sd-profile-name{color:var(--tx);font-weight:600;font-size:16px}
.sd-profile-status{color:var(--tx2);font-size:13px;margin-top:2px}
.sd-sep{border-top:1px solid var(--brd);margin-top:12px;padding-top:12px}
.sd-row{display:flex;align-items:center;gap:10px;padding:11px 0;color:var(--tx);font-size:15px;cursor:pointer;font-weight:400}
.sd-row svg{flex-shrink:0;color:var(--tx2)}
.sd-row:active{opacity:.7}
.sd-row-col{flex-direction:column;align-items:flex-start;gap:8px}
.sd-theme-grid{display:flex;gap:6px;flex-wrap:wrap;width:100%}
.sd-theme-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:13px;cursor:pointer;font-family:'Roboto',sans-serif;font-weight:400}
.sd-theme-btn.act{border-color:var(--acc);background:rgba(102,126,234,.2)}
.sd-about-label{color:var(--tx2);font-size:13px;margin-bottom:8px}
.sd-about-name{color:var(--tx);font-size:15px;font-weight:500}
.sd-about-ver{color:var(--tx2);font-size:14px;margin-top:4px}
.sd-about-desc{color:var(--tx3);font-size:12px;margin-top:8px}
.sd-version{text-align:center;color:var(--tx3);font-size:12px;margin-top:16px}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--bg3);position:relative;cursor:pointer;border:none;transition:background .2s}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.toggle.on::after{left:20px}
.sdl{color:var(--tx2);font-size:13px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.sdi{display:flex;align-items:center;gap:12px;padding:8px 0;cursor:pointer}
.sdi:active{opacity:.7}
.sdi-info{flex:1;min-width:0}
.sdi-name{color:var(--tx);font-size:14px;font-weight:500}
.sdi-you{color:var(--tx3);font-weight:400}
.sdi-status{color:var(--tx3);font-size:12px;margin-top:1px}
.lbtn{margin-top:14px;width:100%;padding:12px;border-radius:10px;border:1px solid rgba(232,93,117,.3);background:rgba(232,93,117,.1);color:var(--red);font-size:15px;font-weight:500;cursor:pointer;font-family:'Roboto',sans-serif}
.sdbk{flex:1}

/* Overlays */
.ov{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:25;display:flex;flex-direction:column}
.ov-h{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--brd)}
.ov-t{color:var(--tx);font-weight:500;font-size:18px;flex:1}
.ov-list{flex:1;overflow-y:auto;padding:8px 0}
.ov-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer}
.ov-item:active{background:var(--bg3)}
.ov-btn{margin:12px 16px;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:15px;font-weight:500;cursor:pointer}
.ov-cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov-cb.sel{background:var(--acc);border-color:var(--acc)}

/* Profile edit */
.pec{display:flex;flex-direction:column;align-items:center;padding:20px;gap:10px}
.pe-av{width:80px;height:80px;border-radius:50%;cursor:pointer;overflow:hidden;position:relative}
.pe-av img{width:100%;height:100%;object-fit:cover}
.pe-input{width:100%;max-width:280px;padding:12px 16px;border-radius:10px;border:1px solid var(--brd);background:var(--bg3);color:var(--tx);font-size:16px;outline:none;font-weight:400}
.pe-input::placeholder{color:var(--tx3)}
.pe-label{color:var(--tx2);font-size:13px;font-weight:500;text-transform:uppercase;margin-top:12px;width:100%;max-width:280px}

/* Call screens */
.cs{position:absolute;top:0;left:0;right:0;bottom:0;z-index:40;display:flex;flex-direction:column;align-items:center;overflow:hidden;animation:csFade .3s ease-out}
@keyframes csFade{from{opacity:0}to{opacity:1}}
.cs.cs-out{background:linear-gradient(160deg,#56b4f9 0%,#667eea 35%,#764ba2 100%)}
.cs.cs-inc{background:linear-gradient(180deg,#2c2541 0%,#3d3557 40%,#2c2541 100%)}
.cs.cs-act{background:linear-gradient(160deg,#56b4f9 0%,#667eea 35%,#764ba2 100%)}
.call-av-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.call-av-ring{width:160px;height:160px;border-radius:50%;border:4px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(255,255,255,.08);animation:cpulse 2.5s ease-in-out infinite}
.call-av-ring-inc{width:170px;height:170px;border-radius:50%;border:3px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(255,255,255,.06)}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.12)}50%{box-shadow:0 0 0 24px rgba(255,255,255,0)}}
.call-name{color:#fff;font-size:26px;font-weight:500;text-align:center}
.call-name-inc{color:#fff;font-size:30px;font-weight:500;text-align:center;margin-top:8px}
.call-inc-type{color:rgba(255,255,255,.5);font-size:15px;font-weight:400;text-align:center}
.call-status{color:rgba(255,255,255,.6);font-size:15px;font-weight:400;text-align:center}
.call-status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);margin-left:6px;animation:sdot 1.5s ease-in-out infinite}
@keyframes sdot{0%,100%{opacity:.3}50%{opacity:1}}
.call-timer{color:rgba(255,255,255,.9);font-size:22px;font-weight:500;text-align:center}
.call-btns{position:absolute;bottom:50px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:41;padding:0 16px}
.call-btns-inc{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:space-around;z-index:41;padding:0 70px}
.call-btn-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.cb{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb:active{transform:scale(.9)}
.cb-sm{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(8px)}
.cb-sm:active{transform:scale(.88)}
.cb-sm.a{background:rgba(255,255,255,.45)}
.cb.dec{background:#E85D75}.cb.end{background:#ff3b30}
.cb.acc-audio{background:#4892f7}
.cb-inc{width:64px;height:64px}
.cb.acc-video{background:#00b894}
.cb-label{color:rgba(255,255,255,.7);font-size:11px;font-weight:400;white-space:nowrap}
.call-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:39}
.call-video-local{position:absolute;bottom:140px;right:16px;width:120px;height:160px;border-radius:12px;object-fit:cover;z-index:42;border:2px solid rgba(255,255,255,.3)}

/* Animations */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:60;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confettiDrop 2s forwards}
@keyframes confettiDrop{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* QR */
.qr-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px}
.qr-canvas{background:#fff;border-radius:12px;padding:12px}

/* Image viewer */
.iv{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:50;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iv img{max-width:95%;max-height:90%;object-fit:contain}
</style>
</head>

// --- Audio recording ---
function startAudio(){
  log('startAudio');vibrate(50);showIndicator();
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    audioStream=stream;audioRec=new MediaRecorder(stream);audioChunks=[];audioIsRec=true;
    audioRec.ondataavailable=function(e){audioChunks.push(e.data)};
    audioRec.onstop=function(){
      audioIsRec=false;
      var elapsed=Date.now()-startTime;
      hideIndicator();
      stream.getTracks().forEach(function(t){t.stop()});audioStream=null;
      if(elapsed<500){log('too short, discarded');return}
      vibrate(50);
      var blob=new Blob(audioChunks,{type:'audio/webm'});if(blob.size<100)return;
      var reader=new FileReader();reader.onload=function(){
        var dur=Math.round(elapsed/1000);var m=Math.floor(dur/60),s=dur%60;
        sM(null,reader.result,m+':'+(s<10?'0':'')+s);log('audio sent')};
      reader.readAsDataURL(blob);
    };
    audioRec.start(500);log('audio recording started');
  }).catch(function(err){hideIndicator();log('gUM audio ERR: '+err.message);alert('Нет доступа к микрофону. Используйте HTTPS.')})
}
function stopAudio(){if(audioIsRec&&audioRec&&audioRec.state==='recording'){audioRec.stop();log('audio stopped')}}
function cancelAudio(){
  if(audioIsRec&&audioRec){
    audioRec.ondataavailable=null;
    audioRec.onstop=function(){audioIsRec=false;hideIndicator();if(audioStream){audioStream.getTracks().forEach(function(t){t.stop()});audioStream=null}};
    audioRec.stop();log('audio cancelled');
  }else{hideIndicator()}
}

// --- Video recording ---
function startVideo(){
  log('startVideo');vibrate(50);showIndicator();videoSec=0;
  navigator.mediaDevices.getUserMedia({audio:true,video:{facingMode:'user',width:320,height:320}}).then(function(stream){
    videoStream=stream;videoChunks=[];videoRec=new MediaRecorder(stream);
    videoRec.ondataavailable=function(e){videoChunks.push(e.data)};
    videoRec.onstop=function(){
      var elapsed=Date.now()-startTime;
      hideIndicator();
      if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}
      clearInterval(videoInt);
      if(elapsed<500){log('too short, discarded');return}
      vibrate(50);
      var blob=new Blob(videoChunks,{type:'video/webm'});
      if(blob.size<100)return;
      if(blob.size>3*1024*1024){alert('Видео слишком большое (макс 30 сек)');return}
      setTimeout(function(){
        var reader=new FileReader();reader.onload=function(){
          var m=Math.floor(videoSec/60),s=videoSec%60;var dur=m+':'+(s<10?'0':'')+s;
          var inp=$('mi'),t=inp.value.trim();inp.value='';updateSendBtn();
          var msg={sender:U,ts:firebase.database.ServerValue.TIMESTAMP,vidMsg:reader.result,vidDur:dur};
          if(t)msg.text=t;
          db.ref('messages/'+cRoom).push(msg);
          db.ref('chats/'+cRoom).update({lastText:'🎥 Видео',lastTs:firebase.database.ServerValue.TIMESTAMP});
          log('video sent');
        };reader.readAsDataURL(blob)},1000);
    };
    videoRec.start(500);
    videoInt=setInterval(function(){videoSec++;if(videoSec>=30)stopVideo()},1000);
    log('video recording started');
  }).catch(function(err){hideIndicator();log('gUM video ERR: '+err.message);alert('Нет доступа к камере. Используйте HTTPS.')})
}
function stopVideo(){if(videoRec&&videoRec.state==='recording'){videoRec.stop();clearInterval(videoInt);log('video stopped')}}
function cancelVideo(){
  if(videoRec&&videoRec.state==='recording'){
    videoRec.ondataavailable=null;
    videoRec.onstop=function(){hideIndicator();if(videoStream){videoStream.getTracks().forEach(function(t){t.stop()});videoStream=null}clearInterval(videoInt)};
    videoRec.stop();log('video cancelled');
  }else{hideIndicator()}
}

// --- Is recording? ---
function active(){return audioIsRec||(videoRec&&videoRec.state==='recording')}

// --- Button logic ---
function begin(){
  pressStart=Date.now();isHolding=false;
  holdTimer=setTimeout(function(){
    isHolding=true;vibrate(50);
    if(mode==='audio')startAudio();else startVideo();
  },500);
}
function end(){
  clearTimeout(holdTimer);
  var dur=Date.now()-pressStart;
  if(!isHolding&&dur<500&&dur>0){
    vibrate(30);
    if(mode==='audio'){mode='video';updateIcon();showTooltip('Удерживайте для записи видео. Нажмите для переключения в голосовой режим.')}
    else{mode='audio';updateIcon();showTooltip('Удерживайте для записи звука. Нажмите для переключения на видео.')}
  }
  pressStart=0;isHolding=false;
}
function send(){
  if(active()){if(mode==='audio')stopAudio();else stopVideo()}
}
function cancel(){
  if(active()){if(mode==='audio')cancelAudio();else cancelVideo()}
}

function setupOntrack(){
  log('setupOntrack');
  pc.ontrack=function(e){
    log('ontrack: '+e.track.kind+' readyState='+e.track.readyState+' streams='+e.streams.length);
    if(e.track.kind==='audio'){
      var ra=document.getElementById('rAudio');
      if(!ra){ra=document.createElement('audio');ra.id='rAudio';ra.autoplay=true;ra.playsInline=true;ra.setAttribute('playsinline','');ra.setAttribute('autoplay','');document.body.appendChild(ra);log('created <audio>')}
      ra.srcObject=(e.streams&&e.streams[0])?e.streams[0]:new MediaStream([e.track]);
      ra.volume=1;
      try{ra.play().then(function(){log('audio play OK')}).catch(function(err){log('audio play ERR: '+err.message)})}catch(ex){log('audio play EX: '+ex)}
    }
    if(e.track.kind==='video'){
      var vs=(e.streams&&e.streams[0])?e.streams[0]:new MediaStream([e.track]);
      $('remoteVid').srcObject=vs;$('remoteVid').classList.remove('hidden');
      try{$('remoteVid').play().catch(function(){})}catch(ex){}
      if($('callAvSection'))$('callAvSection').style.display='none';
      e.track.onmute=function(){$('remoteVid').classList.add('hidden');if($('callAvSection'))$('callAvSection').style.display=''};
      e.track.onunmute=function(){$('remoteVid').classList.remove('hidden');if($('callAvSection'))$('callAvSection').style.display='none'};
      log('video track attached');
    }
  };
  pc.oniceconnectionstatechange=function(){log('ICE: '+pc.iceConnectionState)};
  pc.onconnectionstatechange=function(){log('Conn: '+(pc.connectionState||'n/a'))};
}

function cleanup(){
  log('cleanup');
  if(pc){try{pc.close()}catch(e){}pc=null}
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  var ra=document.getElementById('rAudio');if(ra)ra.remove();
  if(ref){ref.child('answer').off();ref.child('callerIce').off();ref.child('calleeIce').off();ref.child('status').off()}
  ref=null;active=false;peer=null;role=null;muted=false;video=false;incomingVideo=false;
  $('remoteVid').srcObject=null;$('localVid').srcObject=null;
  if($('callAvSection'))$('callAvSection').style.display='';
  hideUI();stopRing();
}

function start(target,withVideo){
  if(active)return;log('start → '+target+' video='+withVideo);
  peer=target;role='caller';active=true;
  var cid=U+'__to__'+target+'__'+Date.now();ref=db.ref('calls/'+cid);
  showUI(target,false);video=!!withVideo;
  if(withVideo){$('callVO').classList.add('a');updateVideoUI()}
  startRing();
  var con=withVideo?{audio:true,video:{facingMode:'user',width:320,height:240}}:{audio:true};
  navigator.mediaDevices.getUserMedia(con).then(function(s){
    stream=s;log('gUM OK: '+s.getTracks().map(function(t){return t.kind}).join(','));
    if(withVideo){$('localVid').srcObject=s;$('localVid').classList.remove('hidden')}
    pc=new RTCPeerConnection(ICE);
    s.getTracks().forEach(function(t){pc.addTrack(t,s)});
    setupOntrack();
    pc.onicecandidate=function(e){if(e.candidate){ref.child('callerIce').push(e.candidate.toJSON());log('ICE cand sent')}};
    pc.createOffer().then(function(o){return pc.setLocalDescription(o)}).then(function(){
      ref.set({from:U,to:target,offer:{type:pc.localDescription.type,sdp:pc.localDescription.sdp},status:'ringing',video:!!withVideo,ts:firebase.database.ServerValue.TIMESTAMP});
      ref.child('answer').on('value',function(sn){var a=sn.val();if(a&&pc&&pc.signalingState!=='closed'){log('got answer');pc.setRemoteDescription(new RTCSessionDescription(a)).then(function(){stopRing();showActiveUI()}).catch(function(err){log('setRemote ERR: '+err)})}});
      ref.child('calleeIce').on('child_added',function(sn){var c=sn.val();if(c&&pc&&pc.signalingState!=='closed')pc.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})});
      ref.child('status').on('value',function(sn){var v=sn.val();if(v==='ended'||v==='declined'){stopRing();cleanup()}});
    })
  }).catch(function(err){log('gUM ERR: '+err.message);alert('Нет доступа к микрофону/камере.');cleanup()});
}

function handleIncoming(cid,data){
  if(active)return;log('incoming from '+data.from);
  active=true;peer=data.from;role='callee';incomingVideo=!!data.video;
  ref=db.ref('calls/'+cid);showUI(data.from,true);startRing();
  showNotif('Входящий вызов',data.from+' звонит');
  ref.child('status').on('value',function(sn){var v=sn.val();if(v==='ended'||v==='cancelled'){stopRing();cleanup()}});
}

function accept(withVideo){
  if(!ref)return;stopRing();video=!!withVideo;speaker=true;
  log('accept video='+withVideo);
  var con=withVideo?{audio:true,video:{facingMode:'user',width:320,height:240}}:{audio:true};
  navigator.mediaDevices.getUserMedia(con).then(function(s){
    stream=s;log('gUM OK: '+s.getTracks().map(function(t){return t.kind}).join(','));
    if(withVideo){$('localVid').srcObject=s;$('localVid').classList.remove('hidden')}
    updateVideoUI();
    ref.once('value',function(sn){var data=sn.val();if(!data||!data.offer)return;
      pc=new RTCPeerConnection(ICE);
      s.getTracks().forEach(function(t){pc.addTrack(t,s)});
      setupOntrack();
      pc.onicecandidate=function(e){if(e.candidate){ref.child('calleeIce').push(e.candidate.toJSON());log('ICE cand sent')}};
      pc.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function(){return pc.createAnswer()}).then(function(a){return pc.setLocalDescription(a)}).then(function(){
        ref.child('answer').set({type:pc.localDescription.type,sdp:pc.localDescription.sdp});
        ref.update({status:'active'});log('answer sent');showActiveUI();
        ref.child('callerIce').on('child_added',function(sn){var c=sn.val();if(c&&pc&&pc.signalingState!=='closed')pc.addIceCandidate(new RTCIceCandidate(c)).catch(function(){})});
      })
    })
  }).catch(function(){alert('Нет доступа к камере/микрофону.');cleanup()});
}

function end(){
  stopRing();
  // REQ-5 + REQ-6: записать сообщение в чат
  if(peer&&U){
    var cid=gci(U,peer);
    var isVideo=video||incomingVideo;
    var callType=isVideo?'Видеозвонок':'Звонок';
    if(sec>0){
      // REQ-6: успешный звонок — записать длительность
      var m=Math.floor(sec/60),s=sec%60;var dur=(m>0?m+':'+(s<10?'0':'')+s:'0:'+(s<10?'0':'')+s);
      var icon=role==='caller'?'📞↗':'📞↙';
      var txt=icon+' '+(role==='caller'?'Исходящий':'Входящий')+' '+callType.toLowerCase()+' '+dur;
      db.ref('messages/'+cid).push({system:true,text:txt,ts:firebase.database.ServerValue.TIMESTAMP});
      db.ref('chats/'+cid).update({lastText:txt,lastTs:firebase.database.ServerValue.TIMESTAMP});
    }else if(role==='callee'){
      // REQ-5: отклонённый входящий — пропущенный
      var txt='📞 Пропущенный '+(isVideo?'видеовызов':'вызов');
      db.ref('messages/'+cid).push({system:true,text:txt,ts:firebase.database.ServerValue.TIMESTAMP,missed:true});
      db.ref('chats/'+cid).update({lastText:txt,lastTs:firebase.database.ServerValue.TIMESTAMP});
    }else if(role==='caller'){
      // Отменённый исходящий
      var txt='📞↗ Отменённый '+(isVideo?'видеовызов':'вызов');
      db.ref('messages/'+cid).push({system:true,text:txt,ts:firebase.database.ServerValue.TIMESTAMP});
      db.ref('chats/'+cid).update({lastText:txt,lastTs:firebase.database.ServerValue.TIMESTAMP});
    }
  }
  if(ref){if(role==='callee')ref.update({status:'declined'});else ref.update({status:active&&pc?'ended':'cancelled'})}
  cleanup();
}

}

else if(action==='vote'){var key=el.getAttribute('data-key'),opt=el.getAttribute('data-opt');if(key&&opt!==null)votePoll(key,parseInt(opt))}
else if(action==='audioSpeed'){var s=AudioPlayer.cycleSpeed();el.textContent=s+'x'}
else if(action==='readmore'){var mb=el.closest('.mb');if(mb){mb.querySelector('.m-text-short').classList.add('hidden');mb.querySelector('.m-text-full').classList.remove('hidden')}}
else if(action==='readless'){var mb=el.closest('.mb');if(mb){mb.querySelector('.m-text-full').classList.add('hidden');mb.querySelector('.m-text-short').classList.remove('hidden')}}
});

// Init

AuthManager.init();
</script>
