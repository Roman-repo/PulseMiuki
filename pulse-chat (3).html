<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pulse Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #000;
    height: 100dvh;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* ---- Login ---- */
  .login-screen {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    padding: 24px;
  }
  .login-logo {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 8px 32px rgba(102,126,234,0.4);
    animation: logoPulse 2s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .login-title { color: #fff; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
  .login-sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 40px; }
  .login-input {
    width: 100%; max-width: 320px; padding: 16px 20px; font-size: 16px;
    border-radius: 16px; border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07); color: #fff; outline: none;
    font-family: 'DM Sans', sans-serif; transition: border-color 0.2s;
    -webkit-appearance: none; touch-action: manipulation;
  }
  .login-input:focus { border-color: rgba(102,126,234,0.6); }
  .login-input::placeholder { color: rgba(255,255,255,0.3); }
  .login-btn {
    margin-top: 16px; width: 100%; max-width: 320px; padding: 16px;
    font-size: 16px; font-weight: 700; border-radius: 16px; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.3s;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
    -webkit-appearance: none; touch-action: manipulation; position: relative; z-index: 5;
  }
  .login-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  }

  /* ---- Chat ---- */
  .chat-screen { height: 100%; display: flex; flex-direction: column; background: #0a0a1a; }
  .chat-header {
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    background: rgba(15,12,41,0.95); border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px); z-index: 10; flex-shrink: 0;
  }
  .menu-btn { background: none; border: none; cursor: pointer; padding: 4px; -webkit-appearance: none; touch-action: manipulation; }
  .header-info { flex: 1; }
  .header-title { color: #fff; font-weight: 700; font-size: 17px; }
  .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 1px; }
  .online-avatars { display: flex; }

  .messages-area {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-text { color: rgba(255,255,255,0.3); font-size: 14px; }
  .loading-text { color: rgba(255,255,255,0.3); font-size: 14px; text-align: center; padding: 20px; }

  .date-divider {
    text-align: center; margin: 12px 0 8px;
    color: rgba(255,255,255,0.3); font-size: 12px; font-weight: 600;
  }
  .date-divider span {
    background: rgba(255,255,255,0.06); padding: 4px 14px; border-radius: 20px;
  }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-row.gap-top { margin-top: 8px; }
  .msg-avatar-col { width: 32px; flex-shrink: 0; }
  .msg-content { max-width: 75%; display: flex; flex-direction: column; }
  .msg-row.me .msg-content { align-items: flex-end; }
  .msg-sender { font-size: 12px; font-weight: 700; margin-bottom: 2px; margin-left: 12px; }
  .msg-bubble {
    padding: 10px 14px; color: #fff; font-size: 15px;
    line-height: 1.45; word-break: break-word;
    animation: msgAppear 0.25s ease-out;
  }
  @keyframes msgAppear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-bubble.other { background: rgba(255,255,255,0.08); border-radius: 18px 18px 18px 4px; }
  .msg-bubble.mine {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 18px 18px 4px 18px;
    box-shadow: 0 2px 12px rgba(102,126,234,0.25);
  }
  .msg-time { font-size: 10px; margin-top: 4px; text-align: right; }
  .msg-time.other { color: rgba(255,255,255,0.3); }
  .msg-time.mine { color: rgba(255,255,255,0.6); }

  .input-bar {
    padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: rgba(15,12,41,0.95); border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; gap: 8px; align-items: flex-end;
    backdrop-filter: blur(20px); flex-shrink: 0;
  }
  .input-wrap {
    flex: 1; background: rgba(255,255,255,0.07);
    border-radius: 22px; display: flex; align-items: center;
  }
  .msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: #fff; font-size: 16px; padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    -webkit-appearance: none; touch-action: manipulation;
  }
  .msg-input::placeholder { color: rgba(255,255,255,0.3); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; cursor: pointer;
    background: rgba(255,255,255,0.08);
    -webkit-appearance: none; touch-action: manipulation;
  }
  .send-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 2px 12px rgba(102,126,234,0.4);
  }

  /* Sidebar */
  .sidebar-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20; display: flex;
  }
  .sidebar {
    width: 280px; background: rgba(15,12,41,0.98);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 24px 20px; backdrop-filter: blur(20px); overflow-y: auto;
  }
  .sidebar-username { color: #fff; font-weight: 700; font-size: 18px; margin-top: 12px; }
  .sidebar-label {
    color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px;
  }
  .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
  .sidebar-item-name { color: #fff; font-size: 14px; font-weight: 600; }
  .sidebar-item-you { color: rgba(255,255,255,0.3); font-weight: 400; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #00b894; display: inline-block; }
  .online-label { color: #00b894; font-size: 11px; }
  .logout-btn {
    margin-top: 32px; width: 100%; padding: 12px; border-radius: 12px;
    border: 1px solid rgba(232,93,117,0.3); background: rgba(232,93,117,0.1);
    color: #E85D75; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    -webkit-appearance: none; touch-action: manipulation;
  }
  .sidebar-backdrop { flex: 1; }
  .hidden { display: none !important; }

  .avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; flex-shrink: 0;
    font-family: 'DM Sans', sans-serif;
  }
</style>
</head>
<body>
<div id="app">
  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div class="login-title">Pulse Chat</div>
    <div class="login-sub">Мгновенные сообщения для всех</div>
    <input class="login-input" id="nameInput" placeholder="Ваше имя" maxlength="20" autocomplete="off">
    <button type="button" class="login-btn" id="loginBtn">Войти в чат &rarr;</button>
  </div>

  <!-- Chat -->
  <div class="chat-screen hidden" id="chatScreen">
    <div class="chat-header">
      <button type="button" class="menu-btn" id="menuBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
      <div class="header-info">
        <div class="header-title">Pulse Chat</div>
        <div class="header-sub" id="onlineCount">Подключение...</div>
      </div>
      <div class="online-avatars" id="headerAvatars"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay hidden" id="sidebarOverlay">
      <div class="sidebar">
        <div id="sidebarAvatar"></div>
        <div class="sidebar-username" id="sidebarName"></div>
        <div class="sidebar-label" id="membersLabel">Участники (0)</div>
        <div id="membersList"></div>
        <button type="button" class="logout-btn" id="logoutBtn">Выйти</button>
      </div>
      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div class="loading-text" id="loadingText">Загрузка сообщений...</div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <input class="msg-input" id="msgInput" placeholder="Сообщение..." autocomplete="off">
      </div>
      <button type="button" class="send-btn" id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="sendIcon">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ---- Firebase Init ----
const firebaseConfig = {
  apiKey: "AIzaSyAYBNM9q7nrJzaLftmD7XfRChmzc9vEPUg",
  authDomain: "pulse-chat-6b66e.firebaseapp.com",
  databaseURL: "https://pulse-chat-6b66e-default-rtdb.firebaseio.com",
  projectId: "pulse-chat-6b66e",
  storageBucket: "pulse-chat-6b66e.firebasestorage.app",
  messagingSenderId: "1036467352069",
  appId: "1:1036467352069:web:34d67625e45eec3fcf626c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ---- State ----
const COLORS = ["#E85D75","#6C5CE7","#00B894","#FDCB6E","#E17055","#0984E3","#A29BFE","#55EFC4","#FF7675","#74B9FF"];
let currentUser = null;
let sidebarOpen = false;
let onlineUsers = {};
let messagesLoaded = false;
let presenceRef = null;

function hashColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}

function makeAvatarHTML(name, size) {
  const color = hashColor(name);
  return '<div class="avatar" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*0.42)+'px;background:linear-gradient(135deg,'+color+','+color+'dd);box-shadow:0 2px 8px '+color+'44;">'+name.charAt(0).toUpperCase()+'</div>';
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(ts) {
  const d = new Date(ts), today = new Date(), yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Сегодня';
  if (d.toDateString() === yesterday.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---- Login ----
const nameInput = document.getElementById('nameInput');
const loginBtn = document.getElementById('loginBtn');

nameInput.addEventListener('input', function() {
  const ok = nameInput.value.trim().length >= 2;
  loginBtn.className = 'login-btn' + (ok ? ' active' : '');
});
nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const name = nameInput.value.trim();
  if (name.length < 2) return;
  currentUser = name;

  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('chatScreen').classList.remove('hidden');
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarAvatar').innerHTML = makeAvatarHTML(name, 56);

  startChat();
}

function doLogout() {
  if (presenceRef) {
    presenceRef.remove();
    presenceRef = null;
  }
  currentUser = null;
  messagesLoaded = false;
  sidebarOpen = false;

  db.ref('messages').off();
  db.ref('online').off();

  document.getElementById('chatScreen').classList.add('hidden');
  document.getElementById('sidebarOverlay').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('messagesArea').innerHTML = '<div class="loading-text">Загрузка сообщений...</div>';
  nameInput.value = '';
  loginBtn.className = 'login-btn';
}

// ---- Chat ----
function startChat() {
  setupPresence();
  listenMessages();
  listenOnline();
  document.getElementById('msgInput').focus();
}

// ---- Presence ----
function setupPresence() {
  var uid = currentUser + '_' + Date.now();
  presenceRef = db.ref('online/' + uid);
  presenceRef.set({ name: currentUser, ts: firebase.database.ServerValue.TIMESTAMP });
  presenceRef.onDisconnect().remove();

  setInterval(function() {
    if (presenceRef) {
      presenceRef.update({ ts: firebase.database.ServerValue.TIMESTAMP });
    }
  }, 20000);
}

function listenOnline() {
  db.ref('online').on('value', function(snap) {
    var data = snap.val() || {};
    var now = Date.now();
    var users = {};
    Object.values(data).forEach(function(u) {
      if (now - u.ts < 60000) {
        users[u.name] = true;
      }
    });
    onlineUsers = users;
    renderOnline();
  });
}

function renderOnline() {
  var names = Object.keys(onlineUsers);
  document.getElementById('onlineCount').textContent = names.length + ' онлайн';

  var hdr = document.getElementById('headerAvatars');
  var html = '';
  names.slice(0, 4).forEach(function(u, i) {
    var ml = i > 0 ? 'margin-left:-8px;' : '';
    html += '<div style="'+ml+'position:relative;z-index:'+(4-i)+';">'+makeAvatarHTML(u, 30)+'</div>';
  });
  if (names.length > 4) {
    html += '<div class="avatar" style="width:30px;height:30px;font-size:11px;background:rgba(255,255,255,0.15);margin-left:-8px;">+'+(names.length - 4)+'</div>';
  }
  hdr.innerHTML = html;

  var list = document.getElementById('membersList');
  document.getElementById('membersLabel').textContent = 'Участники (' + names.length + ')';
  var listHtml = '';
  names.forEach(function(u) {
    listHtml += '<div class="sidebar-item">' +
      makeAvatarHTML(u, 36) +
      '<div>' +
        '<div class="sidebar-item-name">' + esc(u) + (u === currentUser ? ' <span class="sidebar-item-you">(вы)</span>' : '') + '</div>' +
        '<div><span class="online-dot"></span> <span class="online-label">онлайн</span></div>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = listHtml;
}

// ---- Messages ----
function listenMessages() {
  db.ref('messages').orderByChild('ts').limitToLast(200).on('value', function(snap) {
    var data = snap.val();
    var messages = data ? Object.values(data).sort(function(a, b) { return a.ts - b.ts; }) : [];
    renderMessages(messages);
    messagesLoaded = true;
  });
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || !currentUser) return;
  input.value = '';
  updateSendBtn();

  db.ref('messages').push({
    sender: currentUser,
    text: text,
    ts: firebase.database.ServerValue.TIMESTAMP
  });

  setTimeout(function() { input.focus(); }, 50);
}

function renderMessages(messages) {
  var area = document.getElementById('messagesArea');
  var wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 80;

  if (messages.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">Начните разговор!</div></div>';
    return;
  }

  var html = '';
  var lastDate = '', lastSender = '';

  messages.forEach(function(m) {
    var d = formatDate(m.ts);
    if (d !== lastDate) {
      html += '<div class="date-divider"><span>'+d+'</span></div>';
      lastDate = d;
      lastSender = '';
    }
    var isMe = m.sender === currentUser;
    var showAvatar = m.sender !== lastSender;
    var gapClass = showAvatar ? ' gap-top' : '';

    html += '<div class="msg-row'+(isMe ? ' me' : '')+gapClass+'">';
    html += '<div class="msg-avatar-col">';
    if (!isMe && showAvatar) {
      html += makeAvatarHTML(m.sender, 32);
    }
    html += '</div><div class="msg-content">';
    if (!isMe && showAvatar) {
      html += '<div class="msg-sender" style="color:'+hashColor(m.sender)+'">'+esc(m.sender)+'</div>';
    }
    html += '<div class="msg-bubble '+(isMe ? 'mine' : 'other')+'">'+esc(m.text)+'<div class="msg-time '+(isMe ? 'mine' : 'other')+'">'+formatTime(m.ts || Date.now())+'</div></div>';
    html += '</div></div>';
    lastSender = m.sender;
  });

  area.innerHTML = html;

  if (wasAtBottom || !messagesLoaded) {
    area.scrollTop = area.scrollHeight;
  }
}

// ---- Sidebar ----
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebarOverlay').classList.toggle('hidden', !sidebarOpen);
}

// ---- Send btn state ----
var msgInput = document.getElementById('msgInput');
var sendBtn = document.getElementById('sendBtn');
var sendIcon = document.getElementById('sendIcon');

function updateSendBtn() {
  var active = msgInput.value.trim().length > 0;
  sendBtn.className = 'send-btn' + (active ? ' active' : '');
  sendIcon.setAttribute('stroke', active ? '#fff' : 'rgba(255,255,255,0.3)');
}

msgInput.addEventListener('input', updateSendBtn);
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ---- iOS-safe button handlers ----
loginBtn.addEventListener('click', doLogin);
loginBtn.addEventListener('touchend', function(e) { e.preventDefault(); doLogin(); });

sendBtn.addEventListener('click', sendMessage);
sendBtn.addEventListener('touchend', function(e) { e.preventDefault(); sendMessage(); });

document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
document.getElementById('menuBtn').addEventListener('touchend', function(e) { e.preventDefault(); toggleSidebar(); });

document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.getElementById('logoutBtn').addEventListener('touchend', function(e) { e.preventDefault(); doLogout(); });

document.getElementById('sidebarBackdrop').addEventListener('click', toggleSidebar);
document.getElementById('sidebarBackdrop').addEventListener('touchend', function(e) { e.preventDefault(); toggleSidebar(); });
</script>
</body>
</html>
